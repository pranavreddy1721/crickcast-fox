<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Sony max</title>
    <meta name="referrer" content="no-referrer">
    <script src="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/controls.css"/>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-L7VPXZYQPN"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-L7VPXZYQPN');
    </script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{width:100%;height:100%;background:#0b0b0b;overflow:hidden;font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif}
        .shaka-video-container{position:fixed;inset:0;background:#0b0b0b;display:flex;align-items:center;justify-content:center}
        video{width:100%;height:100%;object-fit:contain;background:#0b0b0b}

        /* Pill Watermark */
        .watermark{position:absolute;top:14px;right:16px;z-index:100;pointer-events:none;display:flex;align-items:center;gap:5px;background:rgba(0,0,0,0.35);border:1px solid rgba(0,229,255,0.25);border-radius:4px;padding:3px 8px 3px 6px;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
        .watermark-dot{width:6px;height:6px;border-radius:50%;background:#00e5ff;animation:pulse 2s ease-in-out infinite;flex-shrink:0}
        .watermark-text{font-family:system-ui,-apple-system,sans-serif;font-size:11px;font-weight:700;letter-spacing:1.5px;color:#00e5ff;text-shadow:0 0 8px rgba(0,229,255,0.4)}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

        .block-overlay{position:fixed;inset:0;z-index:99999;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at center,#1a1a1a 0%,#000 100%);text-align:center}
        .block-box{padding:40px;max-width:500px;width:90%;background:rgba(20,20,20,0.95);border-radius:16px;border:1px solid rgba(255,255,255,0.08);box-shadow:0 20px 50px rgba(0,0,0,0.6);animation:fadeInUp 0.6s ease-out}
        @keyframes fadeInUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
        .block-title{font-size:42px;font-weight:800;color:#fff;text-transform:uppercase;letter-spacing:2px;margin-bottom:20px;text-shadow:0 0 12px rgba(255,30,30,0.25)}
        .block-sub{font-size:14px;font-weight:500;color:rgba(255,255,255,0.6);line-height:1.6}
        .block-icon,.block-note{display:none}

        @media(max-width:700px){.watermark{top:8px;right:8px}.watermark-text{font-size:10px}.block-title{font-size:28px}.block-box{padding:25px}.block-sub{font-size:12px}}

        .shaka-controls{background:linear-gradient(180deg,rgba(0,0,0,0) 0%,rgba(0,0,0,0.88) 100%)!important}
        .shaka-control-bar{background:rgba(20,8,8,0.85)!important;backdrop-filter:blur(6px);border-radius:12px 12px 0 0;padding:6px 12px}
        .shaka-seek-bar .shaka-seek-bar-background{background:rgba(255,255,255,0.25)!important;height:4px;border-radius:4px}
        .shaka-seek-bar .shaka-seek-bar-buffered{background:#ff4d4d!important;height:4px;border-radius:4px}
        .shaka-seek-bar .shaka-seek-bar-played{background:#00e676!important;height:4px;border-radius:4px}
        .shaka-seek-bar .shaka-seek-bar-thumb{background:#fff!important;box-shadow:0 0 8px rgba(0,230,118,0.5);width:14px;height:14px;margin-top:-5px}
        .shaka-volume-bar .shaka-seek-bar-played{background:#00e676!important}
        .shaka-volume-bar .shaka-seek-bar-background{background:rgba(255,255,255,0.2)!important}
        .shaka-volume-bar .shaka-seek-bar-thumb{background:#fff!important}
        .shaka-controls-button{color:#fff!important;filter:drop-shadow(0 0 4px rgba(255,60,60,0.2))}
        .shaka-current-time,.shaka-total-time,.shaka-time-separator{color:#f0f0f0!important;font-weight:500}
        .shaka-controls-button:hover{color:#ff6b6b!important}
        .shaka-big-play-button{background:rgba(0,0,0,0.5)!important;border:2px solid rgba(255,255,255,0.3)!important;box-shadow:0 0 30px rgba(0,230,118,0.2)}
        .shaka-big-play-button:hover{border-color:#00e676!important;background:rgba(0,0,0,0.7)!important}
        .shaka-spacer{flex:1 1 auto}
        @media(max-width:700px){.shaka-control-bar{padding:4px 8px}}
    </style>
</head>
<body>
    <div class="shaka-video-container" id="player-container">
        <video id="video" autoplay muted playsinline preload="metadata"></video>
        <div class="watermark"><div class="watermark-dot"></div><span class="watermark-text">CRICKCAST</span></div>
    </div>

    <script>
        (function(){
            function isSandboxedEnv(){
                try{
                    if(window.self===window.top) return false;
                    if(window.frameElement&&window.frameElement.hasAttribute("sandbox")) return true;
                    try{
                        document.domain=document.domain;
                        if(window.frameElement&&!window.frameElement.getAttribute("sandbox")) return false;
                    }catch(e){return true}
                    return false;
                }catch(e){return true}
            }
            function triggerBlockScreen(title,message){
                const container=document.getElementById("player-container");
                const video=document.getElementById("video");
                try{video.pause();video.removeAttribute('src');video.load()}catch(e){}
                const overlay=document.createElement("div");
                overlay.className="block-overlay";
                overlay.id="sandbox-block-display";
                overlay.innerHTML=`<div class="block-box"><div class="block-title">${title}</div><div class="block-sub">${message}</div></div>`;
                document.body.appendChild(overlay);
                container.style.display='none';
            }
            if(isSandboxedEnv()){triggerBlockScreen('Disable Sandbox','Opening Chrome Browser Only & Disable Ad blocker');return;}

            const CONFIG={
                streamUrl:"https://jiotvmblive.cdn.jio.com/bpk-tv/Ten2_HD_MOB/WDVLive/index.mpd",
                keyId:"91fce77f2f8056f084ed961c7ebe86ed",
                key:"8214bd5eb6c21444e8ea644824affd79",
                cookieUrl:"https://allrounder2-0.pages.dev/api/Hindi.json"
            };

            document.addEventListener("DOMContentLoaded",async()=>{
                shaka.polyfill.installAll();
                if(!shaka.Player.isBrowserSupported()) return;

                const video=document.getElementById("video");
                const container=document.getElementById("player-container");
                video.muted=true;

                const player=new shaka.Player();
                await player.attach(video);

                const ui=new shaka.ui.Overlay(player,container,video);
                ui.configure({
                    addBigPlayButton:true,
                    controlPanelElements:["mute","play_pause","time_and_duration","spacer","quality","picture_in_picture","fullscreen"],
                    seekBarColors:{base:"rgba(255,255,255,0.25)",buffered:"#ff4d4d",played:"#00e676"}
                });

                player.configure({
                    drm:{clearKeys:{[CONFIG.keyId]:CONFIG.key}},
                    manifest:{defaultPresentationDelay:5},
                    streaming:{lowLatencyMode:true,bufferingGoal:10,rebufferingGoal:2,safeSeekOffset:5}
                });

                let cookieValue="";
                try{
                    const response=await fetch(CONFIG.cookieUrl,{cache:"no-store"});
                    const data=await response.json();
                    cookieValue=data.cookie||"";
                }catch(e){}

                if(cookieValue){
                    player.getNetworkingEngine().registerRequestFilter((type,request)=>{
                        request.headers["Referer"]="https://www.jiotv.com/";
                        request.headers["User-Agent"]="plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6";
                        request.headers["Cookie"]=cookieValue;
                        let urlCookie=cookieValue.startsWith("__hdnea__=")?cookieValue.substring(10):cookieValue;
                        if((type===shaka.net.NetworkingEngine.RequestType.MANIFEST||type===shaka.net.NetworkingEngine.RequestType.SEGMENT)&&!request.uris[0].includes("__hdnea__")){
                            const sep=request.uris[0].includes("?")?"&":"?";
                            request.uris[0]+=sep+"__hdnea__="+urlCookie;
                        }
                    });
                }

                try{await player.load(CONFIG.streamUrl);video.play().catch(()=>{});}catch(e){console.warn("Load error:",e)}
                video.addEventListener("play",()=>{video.muted=false});
            });
        })();
    </script>
</body>
</html>
