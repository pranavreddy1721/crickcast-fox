  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { background: #000; height: 100vh; width: 100vw; overflow: hidden; font-family: system-ui, -apple-system, sans-serif; }
    .shaka-video-container { position: absolute; inset: 0; width: 100%; height: 100%; }
    video { width: 100%; height: 100%; background: #000; object-fit: contain; }
    .shaka-spinner-container,.shaka-spinner,.shaka-spinner-svg { display: none !important; visibility: hidden !important; opacity: 0 !important; }

    .watermark{position:fixed;top:14px;right:16px;z-index:9999;pointer-events:none;display:flex;align-items:center;gap:5px;background:rgba(0,0,0,0.35);border:1px solid rgba(0,229,255,0.25);border-radius:4px;padding:3px 8px 3px 6px;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
    .watermark-dot{width:6px;height:6px;border-radius:50%;background:#00e5ff;animation:pulse 2s ease-in-out infinite;flex-shrink:0}
    .watermark-text{font-family:system-ui,-apple-system,sans-serif;font-size:11px;font-weight:700;letter-spacing:1.5px;color:#00e5ff;text-shadow:0 0 8px rgba(0,229,255,0.4)}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
    @media(max-width:700px){.watermark{top:8px;right:8px}.watermark-text{font-size:10px}}

</head>
<body>
  <div class="shaka-video-container" data-shaka-player>

  </div>
  <div class="watermark"><div class="watermark-dot"></div><span class="watermark-text">CRICKCAST</span></div>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      shaka.polyfill.installAll();
      if (!shaka.Player.isBrowserSupported()) { console.error('Browser not supported'); return; }

      const video = document.querySelector('video');
      const player = new shaka.Player();
      await player.attach(video);

      const container = document.querySelector('.shaka-video-container');
      const ui = new shaka.ui.Overlay(player, container, video);

      ui.configure({
        controlPanelElements: ['play_pause', 'time_and_duration', 'mute', 'volume', 'spacer', 'language', 'captions', 'picture_in_picture', 'quality', 'fullscreen'],
        volumeBarColors: { base: 'rgba(0,136,255,0.3)', level: 'rgb(0,136,255)' },
        seekBarColors: { base: 'rgba(90,0,0,0.3)', buffered: 'rgba(120,0,0,0.6)', played: 'rgb(170,0,0)' }
      });

      let drmConfig = {
        clearKeys: { "9cd9d8d4bed24a20b03ac0c3f5a80cee": "bb27c858444345b5d0703d2faef51b73" }
      };
      let streamUrl = "https://sh-bks400-08.starhubgo.com/bpk-token/1aa@suklkzw0knjf1whgybw1qvwusvfv0skws4rdfpba/bpk-tv/Cbuzz/output/manifest.mpd";

      player.configure({
        drm: drmConfig,
        streaming: {
          lowLatencyMode: true, bufferingGoal: 15, rebufferingGoal: 2, bufferBehind: 15,
          retryParameters: { timeout: 10000, maxAttempts: 5, baseDelay: 300, backoffFactor: 1.2 },
          segmentRequestTimeout: 8000, segmentPrefetchLimit: 2, useNativeHlsOnSafari: true
        },
        manifest: { retryParameters: { timeout: 8000, maxAttempts: 3 } }
      });

      player.addEventListener('error', (event) => { console.error('Shaka Player Error:', event.detail); });

      try {
        await player.load(streamUrl);
        console.log("Stream loaded successfully");
      } catch (error) {
        console.error('Load error:', error);
      }
    });
  </script>
</body>
</html>
